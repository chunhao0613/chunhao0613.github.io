name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-portfolio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-portfolio/package-lock.json

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            my-portfolio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('my-portfolio/package-lock.json') }}-${{ hashFiles('my-portfolio/src/**/*.[jt]s', 'my-portfolio/src/**/*.[jt]sx', 'my-portfolio/src/**/*.css', 'my-portfolio/next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('my-portfolio/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build static files
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./my-portfolio/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
